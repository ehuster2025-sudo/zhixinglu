<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="知行录 - 知行合一的知识管理平台，收录书籍摘要、历史人物、山海经等内容">
    <meta name="keywords" content="知行录,读书笔记,历史人物,山海经,知识管理">
    <meta name="author" content="知行录">
    
    <!-- Open Graph -->
    <meta property="og:title" content="知行录 - 知行合一">
    <meta property="og:description" content="探索知识的边界，与古今智者对话">
    <meta property="og:type" content="website">
    
    <title>知行录 - 知行合一</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/detail.css">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
</head>
<body>
    <header class="header" role="banner">
        <div class="logo" onclick="App.showHome()" style="cursor:pointer" role="button" tabindex="0" aria-label="返回首页">✦ 知行录</div>
        <button class="btn-icon" onclick="App.toggleTheme()" aria-label="切换主题">🌓</button>
    </header>

    <main class="main" role="main">
        <section class="hero" aria-label="首页横幅">
            <div class="hero-badge">✦ 知识汇聚 · 知行合一</div>
            <h1>探索知识的边界</h1>
            <p>在这里，阅读不仅是记录，更是与古今智者对话的旅程</p>
            
            <div class="hero-stats">
                <div>
                    <div class="hero-stat-value" id="statBooks">0</div>
                    <div class="hero-stat-label">书籍</div>
                </div>
                <div>
                    <div class="hero-stat-value" id="statHistory">0</div>
                    <div class="hero-stat-label">人物</div>
                </div>
                <div>
                    <div class="hero-stat-value" id="statShanhaijing">0</div>
                    <div class="hero-stat-label">异兽</div>
                </div>
            </div>
            
            <!-- Search Box -->
            <div class="search-container">
                <span class="search-icon" aria-hidden="true">🔍</span>
                <input type="search" 
                    id="searchBox" 
                    class="search-box" 
                    placeholder="搜索书籍、人物、名言..." 
                    aria-label="搜索内容"
                    autocomplete="off">
                <div class="search-results" id="searchResults" role="listbox" aria-label="搜索结果"></div>
            </div>
        </section>

        <section class="modules-section" id="modulesSection" aria-label="内容模块">
            <div class="modules-grid">
                <article class="module-card" 
                    tabindex="0" 
                    onclick="App.showModule('books')" 
                    onkeydown="if(event.key==='Enter')App.showModule('books')"
                    role="button"
                    aria-label="浏览书籍摘要">
                    <div class="module-icon">📚</div>
                    <h3>书籍摘要 <span class="module-count" id="booksCount">(0)</span></h3>
                    <p>记录每一本读过的书，收藏思想的火花</p>
                </article>
                <article class="module-card" 
                    tabindex="0" 
                    onclick="App.showModule('history')" 
                    onkeydown="if(event.key==='Enter')App.showModule('history')"
                    role="button"
                    aria-label="浏览历史人物">
                    <div class="module-icon">🏛️</div>
                    <h3>历史人物 <span class="module-count" id="historyCount">(0)</span></h3>
                    <p>以人为镜，可以明得失</p>
                </article>
                <article class="module-card" 
                    tabindex="0" 
                    onclick="App.showModule('shanhaijing')" 
                    onkeydown="if(event.key==='Enter')App.showModule('shanhaijing')"
                    role="button"
                    aria-label="浏览山海经">
                    <div class="module-icon">🐉</div>
                    <h3>山海经 <span class="module-count" id="shanhaijingCount">(0)</span></h3>
                    <p>探索上古神话，领略东方奇幻</p>
                </article>
            </div>
        </section>

        <section class="content-section" id="booksSection" aria-label="书籍摘要列表">
            <nav class="section-nav">
                <button onclick="App.showHome()" aria-label="返回首页">← 首页</button>
            </nav>
            <div class="content-header">
                <h2 class="content-title">书籍摘要</h2>
            </div>
            <div class="filters" id="booksFilters" role="toolbar" aria-label="筛选书籍"></div>
            <div class="grid-view" id="booksGrid" role="list"></div>
        </section>

        <section class="content-section" id="historySection" aria-label="历史人物列表">
            <nav class="section-nav">
                <button onclick="App.showHome()" aria-label="返回首页">← 首页</button>
            </nav>
            <div class="content-header">
                <h2 class="content-title">历史人物</h2>
            </div>
            <div class="filters" id="historyFilters" role="toolbar" aria-label="筛选人物"></div>
            <div class="grid-view" id="historyGrid" role="list"></div>
        </section>

        <section class="content-section" id="shanhaijingSection" aria-label="山海经列表">
            <nav class="section-nav">
                <button onclick="App.showHome()" aria-label="返回首页">← 首页</button>
            </nav>
            <div class="content-header">
                <h2 class="content-title">山海经</h2>
            </div>
            <div class="filters" id="shanhaijingFilters" role="toolbar" aria-label="筛选异兽"></div>
            <div class="grid-view" id="shanhaijingGrid" role="list"></div>
        </section>
    </main>

    <!-- Detail Overlay -->
    <div class="detail-overlay" id="detailOverlay" role="dialog" aria-modal="true" aria-label="详情页面">
        <nav class="detail-nav">
            <button onclick="App.showHome()" aria-label="返回首页">🏠 首页</button>
            <button onclick="DetailRenderer.close()" aria-label="返回列表">← 返回</button>
        </nav>
        <button class="detail-close" onclick="DetailRenderer.close()" aria-label="关闭详情">✕</button>
        <div class="detail-hero">
            <div class="detail-cover" id="detailCover"></div>
            <div class="detail-hero-info">
                <h1 class="detail-hero-title" id="detailTitle"></h1>
                <p class="detail-hero-subtitle" id="detailSubtitle"></p>
                <div class="detail-hero-meta" id="detailMeta"></div>
            </div>
        </div>
        <div class="detail-content" id="detailContent"></div>
    </div>

    <!-- JavaScript Modules -->
    <script src="./js/data-manager.js"></script>
    <script src="./js/storage-manager.js"></script>
    <script src="./js/ui-renderer.js"></script>
    <script src="./js/detail-renderer.js"></script>
    <script src="./js/search-manager.js"></script>
    <script src="./js/share-manager.js"></script>
    <script src="./js/app.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('Service Worker 注册成功');
                    })
                    .catch(error => {
                        console.log('Service Worker 注册失败:', error);
                    });
            });
        }
    </script>
</body>
</html>
