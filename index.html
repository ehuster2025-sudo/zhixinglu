<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知行录 - 知行合一</title>
    <style>
        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #f5f2ed;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a5a;
            --text-muted: #8a8a9a;
            --accent-primary: #1a1a2e;
            --accent-secondary: #8b7355;
            --border: #e8e4df;
            --shadow: 0 4px 12px -2px rgba(26, 26, 46, 0.08);
            --shadow-lg: 0 12px 40px -8px rgba(26, 26, 46, 0.12);
            --radius: 12px;
            --radius-lg: 16px;
            --success: #22c55e;
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f12;
            --bg-secondary: #1a1a1f;
            --bg-card: #1e1e24;
            --text-primary: #f5f2ed;
            --text-secondary: #b8b4ad;
            --text-muted: #6a6a72;
            --accent-primary: #c4a77d;
            --border: #2a2a32;
            --shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); }

        .header { position: fixed; top: 0; left: 0; right: 0; height: 72px; background: var(--bg-primary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 48px; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 600; }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--bg-secondary); cursor: pointer; }

        .main { padding-top: 72px; }
        .hero { padding: 80px 48px 60px; text-align: center; }
        .hero-badge { display: inline-block; padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 100px; font-size: 0.9rem; color: var(--accent-secondary); margin-bottom: 24px; }
        .hero h1 { font-size: 3.5rem; font-weight: 700; margin-bottom: 16px; }
        .hero p { font-size: 1.25rem; color: var(--text-secondary); margin-bottom: 40px; }
        .hero-stats { display: flex; justify-content: center; gap: 48px; }
        .hero-stat-value { font-size: 2rem; font-weight: 700; color: var(--accent-primary); }
        .hero-stat-label { font-size: 0.9rem; color: var(--text-muted); }

        .modules-section { padding: 40px 48px 80px; max-width: 1400px; margin: 0 auto; }
        .modules-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .module-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .module-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .module-icon { font-size: 3rem; margin-bottom: 16px; }
        .module-card h3 { font-size: 1.5rem; margin-bottom: 8px; }
        .module-card p { color: var(--text-secondary); }

        .content-section { padding: 0 48px 80px; max-width: 1400px; margin: 0 auto; display: none; }
        .content-section.active { display: block; }
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .content-title { font-size: 1.75rem; font-weight: 600; }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
        .filter-chip { padding: 8px 16px; border-radius: 100px; font-size: 0.9rem; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; }
        .filter-chip.active { background: var(--accent-primary); color: white; }

        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: all 0.3s; }
        .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .card-cover { height: 180px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
        .card-cover img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-tag { font-size: 0.75rem; color: var(--accent-secondary); margin-bottom: 8px; }
        .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; }
        .card-subtitle { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 12px; }
        .card-summary { font-size: 0.9rem; color: var(--text-muted); }

        .detail-overlay { position: fixed; inset: 0; background: var(--bg-primary); z-index: 300; overflow-y: auto; display: none; }
        .detail-overlay.active { display: block; }
        .detail-nav { position: fixed; top: 24px; left: 24px; display: flex; gap: 12px; z-index: 310; }
        .detail-nav button { padding: 12px 20px; border-radius: var(--radius); border: none; background: var(--bg-card); cursor: pointer; box-shadow: var(--shadow); }
        .detail-close { position: fixed; top: 24px; right: 24px; width: 48px; height: 48px; border-radius: 50%; border: none; background: var(--bg-card); cursor: pointer; z-index: 310; }
        .detail-hero { height: 300px; display: flex; align-items: center; justify-content: center; position: relative; }
        .detail-cover { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 8rem; background: var(--bg-secondary); }
        .detail-hero-info { position: relative; z-index: 2; text-align: center; }
        .detail-hero-title { font-size: 3rem; font-weight: 700; margin-bottom: 12px; }
        .detail-hero-subtitle { font-size: 1.25rem; color: var(--text-secondary); margin-bottom: 16px; }
        .detail-hero-meta { display: flex; justify-content: center; gap: 24px; font-size: 0.95rem; color: var(--text-muted); }
        .detail-content { max-width: 800px; margin: 0 auto; padding: 48px 24px 80px; }
        .detail-section { margin-bottom: 40px; }
        .detail-section-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: var(--accent-primary); }
        .detail-section > p { color: var(--text-secondary); line-height: 1.8; }

        .empty-state { text-align: center; padding: 80px 24px; color: var(--text-muted); }
        .empty-state-icon { font-size: 4rem; margin-bottom: 16px; }

        .section-nav { padding: 16px 48px; }
        .section-nav button { padding: 8px 16px; border-radius: 8px; border: none; background: var(--bg-secondary); cursor: pointer; font-size: 0.9rem; }
        @media (max-width: 768px) { .section-nav { padding: 16px 24px; }
            .hero { padding: 60px 24px 40px; }
            .hero h1 { font-size: 2.5rem; }
            .modules-section { padding: 40px 24px; }
            .modules-grid { grid-template-columns: 1fr; }
            .content-section { padding: 0 24px 60px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="showHome()" style="cursor:pointer">✦ 知行录</div>
        <button class="btn-icon" onclick="toggleTheme()">🌓</button>
    </header>

    <main class="main">
        <section class="hero">
            <div class="hero-badge">✦ 知识汇聚 · 知行合一</div>
            <h1>探索知识的边界</h1>
            <p>在这里，阅读不仅是记录，更是与古今智者对话的旅程</p>
            <div class="hero-stats">
                <div><div class="hero-stat-value" id="booksCount">0</div><div class="hero-stat-label">书籍</div></div>
                <div><div class="hero-stat-value" id="historyCount">0</div><div class="hero-stat-label">人物</div></div>
                <div><div class="hero-stat-value" id="shanhaijingCount">0</div><div class="hero-stat-label">神兽</div></div>
            </div>
        </section>

        <section class="modules-section" id="modulesSection">
            <div class="modules-grid">
                <div class="module-card" onclick="showModule('books')">
                    <div class="module-icon">📚</div>
                    <h3>书籍摘要</h3>
                    <p>记录每一本读过的书，收藏思想的火花</p>
                </div>
                <div class="module-card" onclick="showModule('history')">
                    <div class="module-icon">🏛️</div>
                    <h3>历史人物</h3>
                    <p>以人为镜，可以明得失</p>
                </div>
                <div class="module-card" onclick="showModule('shanhaijing')">
                    <div class="module-icon">🐉</div>
                    <h3>山海经</h3>
                    <p>探索上古神话，领略东方奇幻</p>
                </div>
            </div>
        </section>

        <section class="content-section" id="booksSection">
            <div class="section-nav">
                <button onclick="showHome()">← 首页</button>
            </div>
            <div class="content-header">
                <h2 class="content-title">书籍摘要</h2>
            </div>
            <div class="filters" id="booksFilters"></div>
            <div class="grid-view" id="booksGrid"></div>
        </section>

        <section class="content-section" id="historySection">
            <div class="section-nav">
                <button onclick="showHome()">← 首页</button>
            </div>
            <div class="content-header">
                <h2 class="content-title">历史人物</h2>
            </div>
            <div class="filters" id="historyFilters"></div>
            <div class="grid-view" id="historyGrid"></div>
        </section>

        <section class="content-section" id="shanhaijingSection">
            <div class="section-nav">
                <button onclick="showHome()">← 首页</button>
            </div>
            <div class="content-header">
                <h2 class="content-title">山海经</h2>
            </div>
            <div class="filters" id="shanhaijingFilters"></div>
            <div class="grid-view" id="shanhaijingGrid"></div>
        </section>
    </main>

    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-nav">
            <button onclick="showHome()">🏠 首页</button>
            <button onclick="closeDetail()">← 返回</button>
        </div>
        <button class="detail-close" onclick="closeDetail()">✕</button>
        <div class="detail-hero">
            <div class="detail-cover" id="detailCover"></div>
            <div class="detail-hero-info">
                <h1 class="detail-hero-title" id="detailTitle"></h1>
                <p class="detail-hero-subtitle" id="detailSubtitle"></p>
                <div class="detail-hero-meta" id="detailMeta"></div>
            </div>
        </div>
        <div class="detail-content" id="detailContent"></div>
    </div>

    <script>
        let data = { books: [], history: [], shanhaijing: [] };
        let currentModule = null;
        let currentItemId = null;
        let moduleFilters = { books: 'all', history: 'all', shanhaijing: 'all' };

        async function loadData() {
            try {
                const ts = Date.now();
                const [br, hr, sr] = await Promise.all([
                    fetch(`./data/books.json?t=${ts}`),
                    fetch(`./data/history.json?t=${ts}`),
                    fetch(`./data/shanhaijing.json?t=${ts}`)
                ]);
                const books = await br.json();
                const history = await hr.json();
                const shanhaijing = await sr.json();
                data = { books, history, shanhaijing };
                console.log('Data loaded:', data);
                renderAll();
            } catch(e) { 
                console.error('Load error:', e); 
                alert('数据加载失败: ' + e.message);
            }
        }

        function renderAll() {
            console.log('renderAll called, data:', data);
            document.getElementById('booksCount').textContent = data.books.length;
            document.getElementById('historyCount').textContent = data.history.length;
            document.getElementById('shanhaijingCount').textContent = data.shanhaijing.length;
            renderGrid('books');
            renderGrid('history');
            renderGrid('shanhaijing');
        }

        function renderGrid(module) {
            const grid = document.getElementById(module + 'Grid');
            const items = data[module];
            
            if (!items || !items.length) {
                grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>暂无内容</p></div>';
                return;
            }

            const tags = [...new Set(items.map(i => i.tag).filter(Boolean))];
            const filters = document.getElementById(module + 'Filters');
            filters.innerHTML = `<span class="filter-chip active" onclick="filterItems('${module}', 'all')">全部</span>` + 
                tags.map(t => `<span class="filter-chip" onclick="filterItems('${module}', '${t}')">${t}</span>`).join('');
            
            const currentFilter = moduleFilters[module];
            const filtered = currentFilter === 'all' ? items : items.filter(i => i.tag === currentFilter);
            
            grid.innerHTML = filtered.map(item => `
                <div class="card" onclick="showPreview('${module}', ${item.id})">
                    <div class="card-cover">${item.coverImage ? `<img src="${item.coverImage}">` : item.icon}</div>
                    <div class="card-body">
                        <div class="card-tag">${item.tag || ''}</div>
                        <h3 class="card-title">${item.title}</h3>
                        <p class="card-subtitle">${item.subtitle || ''}</p>
                        <p class="card-summary">${item.summary || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        function showHome() {
            document.querySelector('.hero').style.display = 'block';
            document.getElementById('modulesSection').style.display = 'block';
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        }

        function showModule(module) {
            currentModule = module;
            document.getElementById('modulesSection').style.display = 'none';
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(module + 'Section').classList.add('active');
        }

        function filterItems(module, filter) {
            moduleFilters[module] = filter;
            document.querySelectorAll(`#${module}Filters .filter-chip`).forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            renderGrid(module);
        }

        function showPreview(module, id) {
            currentModule = module;
            currentItemId = id;
            openDetail();
        }

        async function openDetail() {
            const item = data[currentModule].find(i => i.id === currentItemId);
            if (!item) return;
            
            const isBook = currentModule === 'books';
            document.getElementById('detailCover').innerHTML = item.coverImage ? `<img src="${item.coverImage}" style="width:100%;height:100%;object-fit:cover;">` : item.icon;
            document.getElementById('detailTitle').textContent = item.title;
            document.getElementById('detailSubtitle').textContent = item.subtitle || '';
            document.getElementById('detailMeta').innerHTML = isBook ? 
                `<span><strong>年份</strong>${item.year}</span><span><strong>类别</strong>${item.category}</span>` : 
                `<span><strong>标签</strong>${item.tag}</span><span><strong>日期</strong>${item.date}</span>`;
            
            let html = `<div class="detail-section"><h2 class="detail-section-title">${isBook ? '一句话概括' : '基本信息'}</h2><p>${item.summary}</p></div>`;
            
            if (item.contentFile) {
                try {
                    const response = await fetch(item.contentFile);
                    const contentHtml = await response.text();
                    html += `<div class="detail-section">${contentHtml}</div>`;
                } catch(e) {
                    console.error('Failed to load content:', e);
                }
            }
            
            document.getElementById('detailContent').innerHTML = html;
            document.getElementById('detailOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        loadData();
    </script>
</body>
</html>
